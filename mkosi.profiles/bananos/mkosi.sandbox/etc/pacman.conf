# mkosi sandbox pacman configuration for bananos.
#
# A custom pacman.conf disables mkosi's auto-generated repository entries, so
# this file must be self-contained: no mirrorlist includes, and Server lines for
# every enabled repository.

[options]
SigLevel = Required DatabaseOptional
LocalFileSigLevel = Optional
ParallelDownloads = 10
Architecture = x86_64
HoldPkg = pacman glibc
#IgnorePkg = linux-firmware* amd-ucode
CheckSpace
Color

Include = /etc/mkosi-local.conf

[core-testing]
Server = https://fastly.mirror.pkgbuild.com/core-testing/os/$arch

#[kde-unstable]
#Server = https://fastly.mirror.pkgbuild.com/kde-unstable/os/$arch

[core]
Server = https://fastly.mirror.pkgbuild.com/core/os/$arch

[extra-testing]
Server = https://fastly.mirror.pkgbuild.com/extra-testing/os/$arch

[extra]
Server = https://fastly.mirror.pkgbuild.com/extra/os/$arch
